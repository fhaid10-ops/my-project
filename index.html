<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0;url=expenses/">
  <title>المصاريف والمبيعات</title>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) {
          if (!reg.scope.includes('/expenses/') && !reg.scope.includes('/sales/')) {
            reg.unregister();
          }
        });
      });
    }
    location.replace('expenses/');
  </script>
</head>
<body>
  <p style="font-family:system-ui;text-align:center;margin-top:3rem;line-height:2">
    <a href="expenses/">المصاريف اليومية</a><br>
    <a href="sales/">مبيعات</a>
  </p>
</body>
</html>
